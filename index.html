<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Chronologique d'Ornyrak</title>

<!--
  ════════════════════════════════════════════════════════════════════════════
   CODEX CHRONOLOGIQUE D'ORNYRAK
   Frise interactive pour jeu de rôle — fichier HTML autonome (HTML+CSS+JS)
  ════════════════════════════════════════════════════════════════════════════

   SOMMAIRE DU FICHIER
   ───────────────────
   1. POLICES        ........ <link> Google Fonts (Cinzel + EB Garamond)
   2. STYLES (CSS)   ........ tout dans la balise <style> ci-dessous
                              → variables couleurs en haut (zone "PALETTE")
   3. STRUCTURE (HTML) ...... en-tête, barre d'outils, panneau, scène, fenêtre
   4. DONNÉES (JS)   ........ tableau « events » + dictionnaire « CATEGORIES »
                              → C'EST LA SEULE PARTIE À MODIFIER AU QUOTIDIEN
   5. MOTEUR (JS)    ........ rendu, zoom, déplacement, filtres, recherche…

   POUR MODIFIER :(Test)
   • Ajouter / éditer des événements  → bloc « DONNÉES » → tableau « events »
   • Renommer / recolorier une catégorie → bloc « DONNÉES » → objet « CATEGORIES »
   • Changer les couleurs globales      → bloc « PALETTE » (variables :root)
   • Régler l'échelle, le zoom, etc.    → bloc « RÉGLAGES » (constante CONFIG)
  ════════════════════════════════════════════════════════════════════════════
--> 

<!-- 1. POLICES ─────────────────────────────────────────────────────────────
     Cinzel  = capitales lapidaires, effet « manuscrit / inscription »
     EB Garamond = corps de texte, lisible et élégant
     Remplace ces familles ici ET dans les variables --police-* si tu changes. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
/* ╔══════════════════════════════════════════════════════════════════════╗
   ║  PALETTE — modifie ces valeurs pour reteindre tout le codex            ║
   ╚══════════════════════════════════════════════════════════════════════╝ */
:root{
  /* — Couleurs de base — */
  --parchemin:        #e7d8b5; /* fond parchemin clair          */
  --parchemin-fonce:  #d8c499; /* zones creusées / ombres        */
  --parchemin-bord:   #c2a96f; /* lisérés                        */
  --ivoire:           #f6f0e0; /* surfaces claires (fenêtre)     */
  --bronze:           #8a6a3c; /* métal, traits, contours        */
  --bronze-clair:     #b08c54;
  --or:               #c8a02a; /* accents dorés, surbrillances   */
  --or-clair:         #e3c45a;
  --bleu-nuit:        #1a2541; /* texte fort, bandeaux profonds  */
  --bleu-nuit-clair:  #2c3a63;
  --encre:            #3a2c1a; /* couleur de texte courante      */
  --encre-pale:       #6b5638;

  /* — Polices (voir <link> plus haut) — */
  --police-titre: 'Cinzel', 'Cinzel Decorative', Georgia, serif;
  --police-corps: 'EB Garamond', Georgia, 'Times New Roman', serif;

  /* — Mesures de l'interface — */
  --rayon: 6px;
  --ombre-douce: 0 2px 10px rgba(40,28,12,.25);
  --ombre-forte: 0 14px 40px rgba(20,14,6,.45);
  --largeur-panneau: 320px;
}

/* ╔══════════════════════════════════════════════════════════════════════╗
   ║  BASE                                                                  ║
   ╚══════════════════════════════════════════════════════════════════════╝ */
*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; }
body{
  font-family:var(--police-corps);
  color:var(--encre);
  background:
    /* taches et vieillissement du parchemin (dégradés radiaux superposés) */
    radial-gradient(circle at 18% 22%, rgba(138,106,60,.18), transparent 38%),
    radial-gradient(circle at 82% 12%, rgba(138,106,60,.14), transparent 40%),
    radial-gradient(circle at 70% 88%, rgba(90,64,30,.20), transparent 45%),
    radial-gradient(circle at 30% 75%, rgba(160,130,80,.12), transparent 42%),
    linear-gradient(150deg, var(--parchemin), var(--parchemin-fonce));
  background-attachment:fixed;
  overflow:hidden; /* la frise gère son propre défilement */
  overscroll-behavior:none; /* évite le « tirer pour rafraîchir » sur mobile */
  -webkit-font-smoothing:antialiased;
}

/* Disposition générale : en-tête / outils / corps en colonne */
.codex{
  display:flex; flex-direction:column;
  height:100vh;
}

/* ── EN-TÊTE ────────────────────────────────────────────────────────────── */
.codex-entete{
  position:relative;
  text-align:center;
  padding:14px 16px 12px;
  background:linear-gradient(180deg, var(--bleu-nuit), var(--bleu-nuit-clair));
  color:var(--ivoire);
  border-bottom:3px solid var(--or);
  box-shadow:var(--ombre-douce);
  flex:0 0 auto;
}
.codex-entete::before,
.codex-entete::after{ /* filets dorés décoratifs */
  content:""; position:absolute; left:18px; right:18px; height:1px;
  background:linear-gradient(90deg, transparent, var(--or), transparent);
}
.codex-entete::before{ top:6px; }
.codex-entete::after{ bottom:6px; }
.codex-titre{
  font-family:var(--police-titre); font-weight:700;
  letter-spacing:.14em; margin:0;
  font-size:clamp(20px, 3.2vw, 34px);
  color:var(--or-clair);
  text-shadow:0 1px 0 #000, 0 0 14px rgba(200,160,42,.35);
}
.codex-sous-titre{
  font-style:italic; opacity:.82; margin:.25em 0 0;
  font-size:clamp(12px, 1.6vw, 15px); letter-spacing:.04em;
}

/* ── BARRE D'OUTILS ─────────────────────────────────────────────────────── */
.barre-outils{
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  padding:10px 16px;
  background:linear-gradient(180deg, var(--parchemin), var(--parchemin-fonce));
  border-bottom:2px solid var(--bronze);
  flex:0 0 auto;
}

/* Recherche */
.recherche{ position:relative; }
.recherche input{
  font-family:var(--police-corps); font-size:15px;
  padding:8px 32px 8px 12px; width:230px; max-width:50vw;
  color:var(--encre); background:var(--ivoire);
  border:1px solid var(--bronze); border-radius:var(--rayon);
  outline:none;
}
.recherche input:focus{ border-color:var(--or); box-shadow:0 0 0 2px rgba(200,160,42,.35); }
.recherche .loupe{
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  color:var(--bronze); pointer-events:none; font-size:15px;
}

/* Filtres par catégorie (puces) */
.filtres{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.filtre-puce{
  display:inline-flex; align-items:center; gap:6px;
  font-family:var(--police-corps); font-size:13px; letter-spacing:.02em;
  padding:5px 11px 5px 8px;
  background:var(--ivoire); color:var(--encre);
  border:1.5px solid var(--cat, var(--bronze)); border-radius:999px;
  cursor:pointer; user-select:none;
  transition:background .15s, opacity .15s, transform .1s;
}
.filtre-puce .pastille{
  width:11px; height:11px; border-radius:50%;
  background:var(--cat, var(--bronze)); flex:0 0 auto;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.2);
}
.filtre-puce[aria-pressed="false"]{ opacity:.4; }      /* catégorie masquée */
.filtre-puce:hover{ transform:translateY(-1px); }
.filtre-puce:focus-visible{ outline:2px solid var(--or); outline-offset:2px; }

/* Boutons génériques (zoom, présent, tout afficher…) */
.btn{
  font-family:var(--police-titre); font-size:12px; font-weight:600;
  letter-spacing:.06em; text-transform:uppercase;
  padding:7px 12px; cursor:pointer;
  color:var(--ivoire);
  background:linear-gradient(180deg, var(--bronze-clair), var(--bronze));
  border:1px solid #6b5024; border-radius:var(--rayon);
  box-shadow:var(--ombre-douce);
  transition:filter .15s, transform .1s;
}
.btn:hover{ filter:brightness(1.08); }
.btn:active{ transform:translateY(1px); }
.btn:focus-visible{ outline:2px solid var(--or); outline-offset:2px; }
.btn-rond{ width:36px; height:36px; padding:0; font-size:18px; line-height:1; border-radius:50%; }

.groupe-droite{ margin-left:auto; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.compteur{
  font-family:var(--police-titre); font-size:13px; letter-spacing:.04em;
  color:var(--bleu-nuit);
  padding:6px 10px; background:var(--ivoire);
  border:1px solid var(--bronze); border-radius:var(--rayon);
  white-space:nowrap;
}
.compteur b{ color:var(--bronze); }

/* ── CORPS : panneau latéral + scène de la frise ───────────────────────── */
.codex-corps{ display:flex; flex:1 1 auto; min-height:0; }

/* Panneau latéral (détails de l'événement sélectionné) */
.panneau{
  flex:0 0 var(--largeur-panneau); width:var(--largeur-panneau);
  background:linear-gradient(180deg, var(--ivoire), var(--parchemin));
  border-right:2px solid var(--bronze);
  padding:18px 18px 22px; overflow-y:auto;
  transition:margin-left .3s ease; /* pour le repli sur ordinateur */
}
/* Panneau replié sur ordinateur : il glisse hors champ et rend la place à la frise */
.panneau.replie{ margin-left:calc(-1 * var(--largeur-panneau) - 4px); }
.panneau h2{
  font-family:var(--police-titre); font-weight:600; letter-spacing:.06em;
  font-size:13px; text-transform:uppercase; color:var(--bronze);
  margin:0 0 10px; padding-bottom:8px;
  border-bottom:1px solid var(--parchemin-bord);
}
.panneau-vide{ color:var(--encre-pale); font-style:italic; line-height:1.6; }

/* Fiche de détail (réutilisée dans le panneau ET dans la fenêtre modale) */
.fiche-annee{
  font-family:var(--police-titre); font-weight:700; font-size:30px;
  color:var(--bleu-nuit); line-height:1;
}
.fiche-annee small{ font-size:14px; font-weight:500; color:var(--bronze); letter-spacing:.1em; }
.fiche-titre{
  font-family:var(--police-titre); font-weight:600; font-size:19px;
  color:var(--encre); margin:.5em 0 .35em; line-height:1.25;
}
.fiche-cat{
  display:inline-flex; align-items:center; gap:7px;
  font-size:12px; letter-spacing:.05em; text-transform:uppercase;
  font-family:var(--police-titre); font-weight:600;
  padding:4px 10px; border-radius:999px;
  color:var(--ivoire); background:var(--cat, var(--bronze));
}
.fiche-cat svg{ width:14px; height:14px; fill:currentColor; }
.fiche-image{
  margin:14px 0; border:1px solid var(--bronze); border-radius:var(--rayon);
  background:var(--parchemin-fonce); aspect-ratio:16/9;
  display:flex; align-items:center; justify-content:center;
  color:var(--encre-pale); font-style:italic; font-size:13px; overflow:hidden;
}
.fiche-image img{ width:100%; height:100%; object-fit:cover; display:block; }
.fiche-desc{ line-height:1.65; font-size:16px; margin-top:12px; }
.fiche-sep{ height:1px; margin:16px 0; background:linear-gradient(90deg,transparent,var(--bronze),transparent); }

/* Légende des catégories dans le panneau */
.legende{ list-style:none; padding:0; margin:0; display:grid; gap:7px; }
.legende li{ display:flex; align-items:center; gap:9px; font-size:14px; }
.legende .pastille{ width:13px; height:13px; border-radius:3px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.25); }

/* ── SCÈNE DE LA FRISE ──────────────────────────────────────────────────── */
.scene{ position:relative; flex:1 1 auto; min-width:0; overflow:hidden; }

/* Le « viewport » masque ; le « plan » est très large et se déplace/zoome */
.viewport{
  position:absolute; inset:0; overflow:hidden;
  cursor:grab;
  touch-action:none;          /* ESSENTIEL mobile : on gère nous-mêmes glissement/pincement */
  user-select:none; -webkit-user-select:none; /* pas de sélection de texte pendant le glissement */
  -webkit-tap-highlight-color:transparent;
  /* léger voile sombre en haut/bas pour donner de la profondeur */
  background:
    linear-gradient(180deg, rgba(26,37,65,.06), transparent 12%, transparent 88%, rgba(26,37,65,.06));
}
.viewport.attrape{ cursor:grabbing; }
.plan{
  position:absolute; top:0; left:0; height:100%;
  will-change:transform;
  /* la transition n'est active que pour les zooms « boutons », pas le drag */
}
.plan.anime{ transition:transform .35s cubic-bezier(.22,.61,.36,1); }

/* Axe central horizontal (le « fil du temps ») */
.axe{
  position:absolute; left:0; right:0;
  height:6px;
  background:linear-gradient(180deg, var(--or-clair), var(--bronze));
  box-shadow:0 0 0 1px #5a4220, 0 3px 8px rgba(0,0,0,.25);
  border-radius:3px;
}

/* Graduations */
.tick{ position:absolute; transform:translateX(-50%); }
.tick .trait{ position:absolute; left:50%; transform:translateX(-50%); width:2px; background:var(--bronze); }
.tick.majeure .trait{ width:3px; background:var(--bleu-nuit); }
.tick .etiquette{
  position:absolute; left:50%; transform:translateX(-50%);
  font-family:var(--police-titre); font-weight:600; white-space:nowrap;
  color:var(--bleu-nuit);
}
.tick.majeure .etiquette{ font-size:14px; }
.tick.mineure .etiquette{ font-size:11px; color:var(--encre-pale); }

/* Marqueur d'événement (titre vers l'extérieur, connecteur vers l'axe).
   Ordre DOM des enfants : libelle, annee-mini, sceau, connecteur.
   • Au-dessus de l'axe (.evt)         : colonne normale → titre en haut (loin
     de la ligne), connecteur en bas qui rejoint l'axe.
   • En-dessous de l'axe (.evt.dessous): colonne inversée → connecteur en haut
     contre l'axe, titre en bas (loin de la ligne). */
.evt{
  position:absolute; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center;
  width:150px;                 /* largeur de référence = CONFIG.largeurEvt */
  cursor:pointer; text-align:center;
}
.evt.dessous{ flex-direction:column-reverse; }

.evt .connecteur{ width:2px; background:var(--bronze); opacity:.7; flex:0 0 auto; }
.evt .sceau{
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color:var(--ivoire); background:var(--cat, var(--bronze));
  border:2px solid var(--ivoire);
  box-shadow:0 0 0 2px var(--cat, var(--bronze)), var(--ombre-douce);
  transition:transform .15s, box-shadow .15s;
  flex:0 0 auto;
}
.evt .sceau svg{ width:20px; height:20px; fill:currentColor; }
.evt .annee-mini{
  font-size:11px; color:var(--bronze); font-family:var(--police-titre);
  margin:4px 0 2px; flex:0 0 auto;
}
.evt .libelle{
  font-family:var(--police-titre); font-weight:600; font-size:12.5px;
  line-height:1.25; color:var(--encre);
  margin:0 0 6px; max-width:100%;                 /* marge sous le titre = écart avec le sceau */
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  text-shadow:0 1px 0 rgba(246,240,224,.7); flex:0 0 auto;
}
/* Sous l'axe, la marge du titre passe au-dessus (toujours côté extérieur) */
.evt.dessous .libelle{ margin:6px 0 0; }
.evt.dessous .annee-mini{ margin:2px 0 4px; }

.evt:hover .sceau{ transform:scale(1.12); box-shadow:0 0 0 2px var(--or), 0 0 14px rgba(200,160,42,.6); }
.evt.actif .sceau{ box-shadow:0 0 0 3px var(--or), 0 0 18px rgba(200,160,42,.8); transform:scale(1.12); }
.evt:focus-visible{ outline:none; }
.evt:focus-visible .sceau{ box-shadow:0 0 0 3px var(--or); }

/* ── ÉVÉNEMENT-PÉRIODE : bandeau horizontal (de l'année de début à la fin) ──
   Se distingue d'un événement ponctuel : barre ornée tendue le long de l'axe,
   teinte de la catégorie, libellé centré. Cliquable comme un sceau. */
.periode{
  position:absolute; box-sizing:border-box;
  height:30px; padding:0 12px; overflow:hidden;
  display:flex; align-items:center; justify-content:center; gap:8px;
  cursor:pointer; text-align:center;
  border:1.5px solid var(--cat, var(--bronze));
  border-radius:15px;
  /* fond parcheminé légèrement teinté de la couleur de catégorie */
  background:
    linear-gradient(180deg, color-mix(in srgb, var(--cat) 26%, var(--ivoire)),
                            color-mix(in srgb, var(--cat) 14%, var(--ivoire)));
  box-shadow:var(--ombre-douce), inset 0 0 0 1px rgba(255,255,255,.35);
  transition:box-shadow .15s, transform .1s;
}
.periode .periode-titre{
  font-family:var(--police-titre); font-weight:600; font-size:13px;
  color:var(--encre); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:inline-flex; align-items:center; gap:6px;
}
.periode .periode-titre svg{ width:15px; height:15px; fill:var(--cat, var(--bronze)); flex:0 0 auto; }
.periode .periode-annees{
  font-family:var(--police-titre); font-size:11px; color:var(--cat, var(--bronze));
  white-space:nowrap; opacity:.9; flex:0 0 auto;
}
.periode:hover{ box-shadow:0 0 0 2px var(--or), 0 0 14px rgba(200,160,42,.5); }
.periode.actif{ box-shadow:0 0 0 3px var(--or), 0 0 18px rgba(200,160,42,.7); }
.periode:focus-visible{ outline:2px solid var(--or); outline-offset:2px; }

/* ── FENÊTRE MODALE (ouverture au clic sur un événement) ─────────────────── */
.voile{
  position:fixed; inset:0; z-index:50;
  background:rgba(20,14,6,.55); backdrop-filter:blur(2px);
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.voile.ouvert{ opacity:1; pointer-events:auto; }
.fenetre{
  position:relative; width:min(560px, 94vw); max-height:88vh; overflow:auto;
  background:
    radial-gradient(circle at 80% 0%, rgba(200,160,42,.12), transparent 40%),
    linear-gradient(160deg, var(--ivoire), var(--parchemin));
  border:2px solid var(--bronze);
  border-radius:10px;
  box-shadow:var(--ombre-forte);
  padding:26px 28px 28px;
  transform:translateY(14px) scale(.98);
  transition:transform .25s cubic-bezier(.22,.61,.36,1);
}
.voile.ouvert .fenetre{ transform:translateY(0) scale(1); }
/* Coins ornés dorés */
.fenetre::before,.fenetre::after{
  content:""; position:absolute; width:26px; height:26px;
  border:2px solid var(--or); pointer-events:none;
}
.fenetre::before{ top:8px; left:8px; border-right:0; border-bottom:0; }
.fenetre::after{ bottom:8px; right:8px; border-left:0; border-top:0; }
.fermer{
  position:absolute; top:12px; right:12px;
  width:32px; height:32px; border-radius:50%;
  border:1px solid var(--bronze); background:var(--ivoire); color:var(--bronze);
  font-size:18px; line-height:1; cursor:pointer;
}
.fermer:hover{ background:var(--bronze); color:var(--ivoire); }
.fenetre-nav{ display:flex; justify-content:space-between; gap:10px; margin-top:20px; }

/* ── RESPONSIVE : tablette et plus petit ────────────────────────────────── */
@media (max-width:880px){
  /* le panneau latéral se transforme en tiroir coulissant */
  .panneau{
    position:absolute; z-index:30; top:0; bottom:0; left:0;
    box-shadow:var(--ombre-forte);
    transform:translateX(-105%); transition:transform .3s;
  }
  .panneau.ouvert{ transform:translateX(0); }
  .recherche input{ width:160px; }
}
@media (max-width:880px){
  /* sur mobile, le panneau replié (état ordinateur) ne s'applique pas */
  .panneau.replie{ margin-left:0; }
}

/* Accessibilité : respecte la préférence « moins d'animations » */
@media (prefers-reduced-motion:reduce){
  *{ animation:none !important; transition:none !important; }
}
</style>
</head>

<body>
<!-- ╔══════════════════════════════════════════════════════════════════════╗
     ║  3. STRUCTURE (HTML)                                                  ║
     ╚══════════════════════════════════════════════════════════════════════╝ -->
<div class="codex">

  <!-- EN-TÊTE -->
  <header class="codex-entete">
    <h1 class="codex-titre">Codex Chronologique d'Ornyrak</h1>
    <p class="codex-sous-titre">De la Fondation à l'Âge présent — 0 à 1095 A.E.</p>
  </header>

  <!-- BARRE D'OUTILS -->
  <div class="barre-outils">
    <button id="bascule-panneau" class="btn" title="Afficher / masquer le panneau de détails">☰ Panneau</button>

    <div class="recherche">
      <input id="recherche" type="search" placeholder="Rechercher un événement…" aria-label="Rechercher">
      <span class="loupe">⌕</span>
    </div>

    <!-- Les puces de filtre sont générées par le JS d'après l'objet CATEGORIES -->
    <div class="filtres" id="filtres" role="group" aria-label="Filtres par catégorie"></div>
    <button class="btn" id="tout-afficher" title="Réafficher toutes les catégories">Tout</button>

    <div class="groupe-droite">
      <span class="compteur" id="compteur">— <b>0</b> événement —</span>
      <button class="btn btn-rond" id="zoom-moins" title="Dézoomer" aria-label="Dézoomer">−</button>
      <button class="btn btn-rond" id="zoom-plus" title="Zoomer" aria-label="Zoomer">+</button>
      <button class="btn" id="present" title="Revenir à l'année présente (1095 A.E.)">Présent</button>
    </div>
  </div>

  <!-- CORPS : panneau + scène -->
  <div class="codex-corps">

    <!-- PANNEAU LATÉRAL (détails + légende) -->

/* ╔══════════════════════════════════════════════════════════════════════╗
   ║  RÉGLAGES — bornes, zoom, échelle                                      ║
   ╚══════════════════════════════════════════════════════════════════════╝ */
const CONFIG = {
  anneeMin:        0,      // début de la frise
  anneeMax:        1095,   // fin de la frise
  anneePresent:    1095,   // cible du bouton « Présent »
  suffixeAnnee:    "A.E.", // affiché à côté des années

  gradMajeure:     100,    // graduation majeure (étiquetée) tous les … ans
  gradMineure:     25,     // graduation mineure tous les … ans

  pxParAnMin:      1.3,    // zoom minimal (px par année) — vue d'ensemble
  pxParAnMax:      36,     // zoom maximal — vue rapprochée
  pxParAnInit:     6,      // zoom au démarrage
  facteurMolette:  0.0016, // sensibilité de la molette

  largeurEvt:      150,    // largeur d'un marqueur ponctuel (doit = .evt {width})
  ecartEvt:        14,     // espace horizontal minimal entre deux marqueurs
  // — Disposition verticale : POINTS au-dessus de l'axe, PÉRIODES en dessous —
  basePoint:       26,     // distance du 1er niveau de points à l'axe
  hauteurNiveau:   100,    // espacement vertical entre niveaux de points (titre+sceau)
  basePeriode:     46,     // distance du 1er bandeau à l'axe (sous les étiquettes d'années)
  hauteurBande:    44,     // espacement vertical entre niveaux de périodes
  margeAnnees:     70      // marge (en années) à gauche/droite de la frise
};


/* ╔══════════════════════════════════════════════════════════════════════╗
   ║  5. MOTEUR — (en principe, pas besoin d'y toucher)                     ║
   ╚══════════════════════════════════════════════════════════════════════╝ */

// — Raccourcis DOM —
const $  = (sel)=>document.querySelector(sel);
const viewport = $("#viewport");
const plan     = $("#plan");
const axe      = $("#axe");

// — État courant —
let pxParAn   = CONFIG.pxParAnInit; // zoom actuel
let decalageX = 0;                  // translation horizontale du plan (px)
let filtresActifs = new Set(Object.keys(CATEGORIES)); // catégories visibles
let recherche = "";                 // texte de recherche
let evtSelId  = null;               // id de l'événement sélectionné
let evtVisibles = [];               // liste des événements actuellement affichés

// On donne un identifiant stable à chaque événement (pour la sélection)
events.forEach((e,i)=> e._id = i);

// — Conversions année ↔ pixels —
const largeurPlan = ()=> (CONFIG.anneeMax - CONFIG.anneeMin + CONFIG.margeAnnees*2) * pxParAn;
const anneeEnX    = (an)=> (an - CONFIG.anneeMin + CONFIG.margeAnnees) * pxParAn;
const xEnAnnee    = (x )=> x / pxParAn + CONFIG.anneeMin - CONFIG.margeAnnees;

// — Périodes —
// Un événement est une PÉRIODE s'il possède un champ « yearEnd » supérieur à
// « year ». Sinon c'est un événement PONCTUEL (un seul point sur la frise).
const estPeriode  = (e)=> typeof e.yearEnd === "number" && e.yearEnd > e.year;
const anneeRepr   = (e)=> estPeriode(e) ? (e.year + e.yearEnd)/2 : e.year; // année « centre » (pour recentrer)
const libelleAnnee= (e)=> estPeriode(e)
  ? `${e.year} – ${e.yearEnd} ${CONFIG.suffixeAnnee}`   // ex. « 300 – 600 A.E. »
  : `${e.year} ${CONFIG.suffixeAnnee}`;                 // ex. « 412 A.E. »

// Empreinte horizontale (en pixels) servant à la répartition anti-chevauchement.
// • périodes : de l'année de début à l'année de fin (avec un minimum lisible)
// • ponctuels : largeur fixe d'un marqueur centré sur l'année
function empreintePx(e){
  if(estPeriode(e)){
    let d = anneeEnX(e.year), f = anneeEnX(e.yearEnd);
    // largeur minimale pour que le libellé reste lisible même très dézoomé
    if(f - d < CONFIG.largeurEvt){ const c=(d+f)/2; d=c-CONFIG.largeurEvt/2; f=c+CONFIG.largeurEvt/2; }
    return { debut:d - CONFIG.ecartEvt/2, fin:f + CONFIG.ecartEvt/2 };
  }
  const x = anneeEnX(e.year), demi = CONFIG.largeurEvt/2 + CONFIG.ecartEvt/2;
  return { debut:x - demi, fin:x + demi };
}

/* ───────────────────────────────────────────────────────────────────────
   Construction de la barre de filtres et de la légende (une seule fois)
   ─────────────────────────────────────────────────────────────────────── */
function construireFiltresEtLegende(){
  const conteneurFiltres = $("#filtres");
  const legende = $("#legende");
  conteneurFiltres.innerHTML = "";
  legende.innerHTML = "";

  for(const [cle, cat] of Object.entries(CATEGORIES)){
    // — Puce de filtre —
    const puce = document.createElement("button");
    puce.className = "filtre-puce";
    puce.style.setProperty("--cat", cat.couleur);
    puce.setAttribute("aria-pressed", "true");
    puce.dataset.cat = cle;
    puce.innerHTML = `<span class="pastille"></span>${cat.libelle}`;
    puce.addEventListener("click", ()=> basculerFiltre(cle, puce));
    conteneurFiltres.appendChild(puce);

    // — Ligne de légende —
    const li = document.createElement("li");
    li.innerHTML = `<span class="pastille" style="background:${cat.couleur}"></span>${cat.libelle}`;
    legende.appendChild(li);
  }
}

function basculerFiltre(cle, puce){
  if(filtresActifs.has(cle)){ filtresActifs.delete(cle); puce.setAttribute("aria-pressed","false"); }
  else                       { filtresActifs.add(cle);    puce.setAttribute("aria-pressed","true");  }
  rendre();
}

/* ───────────────────────────────────────────────────────────────────────
   Graduations (ticks majeurs/mineurs) — recalculées à chaque rendu de zoom
   ─────────────────────────────────────────────────────────────────────── */
function construireTicks(){
  // Supprime les anciens ticks
  plan.querySelectorAll(".tick").forEach(t=>t.remove());

  const hauteur = viewport.clientHeight;
  const axeY = hauteur/2;          // l'axe est au centre vertical
  axe.style.top = axeY + "px";

  for(let an = CONFIG.anneeMin; an <= CONFIG.anneeMax; an += CONFIG.gradMineure){
    const majeure = (an % CONFIG.gradMajeure === 0);
    const tick = document.createElement("div");
    tick.className = "tick " + (majeure ? "majeure" : "mineure");
    tick.style.left = anneeEnX(an) + "px";
    tick.style.top  = "0px";
    tick.style.height = hauteur + "px";

    const longueur = majeure ? 16 : 9;
    const trait = document.createElement("div");
    trait.className = "trait";
    trait.style.top = (axeY - longueur) + "px";
    trait.style.height = (longueur*2) + "px";
    tick.appendChild(trait);

    // Étiquette : toutes les majeures, et les mineures seulement si le zoom le permet
    if(majeure || pxParAn >= 8){
      const et = document.createElement("div");
      et.className = "etiquette";
      et.style.top = (axeY + longueur + 6) + "px";
      et.textContent = an + (majeure ? " " + CONFIG.suffixeAnnee : "");
      tick.appendChild(et);
    }
    plan.appendChild(tick);
  }
}

/* ───────────────────────────────────────────────────────────────────────
   Filtrage des événements selon catégories actives + recherche
   ─────────────────────────────────────────────────────────────────────── */
function filtrer(){
  const q = recherche.trim().toLowerCase();
  return events.filter(e=>{
    if(!filtresActifs.has(e.category)) return false;
    if(q){
      const champ = (e.title + " " + (e.description||"")).toLowerCase();
      if(!champ.includes(q)) return false;
    }
    return true;
  });
}

/* ───────────────────────────────────────────────────────────────────────
   Répartition anti-chevauchement (« lane packing »)
   On trie par année, puis on place chaque marqueur sur le premier niveau
   dont la dernière occupation se termine avant le début du marqueur courant.
   Les niveaux sont ensuite disposés alternativement au-dessus / en-dessous
   de l'axe → aucun chevauchement possible, densité doublée, lisibilité OK.
   ─────────────────────────────────────────────────────────────────────── */
function repartirNiveaux(liste){
  const tries = [...liste].sort((a,b)=> a.year - b.year);
  const finDesNiveaux = []; // finDesNiveaux[i] = position x de fin du niveau i

  for(const e of tries){
    const { debut, fin } = empreintePx(e);   // empreinte réelle (point OU période)
    let niveau = 0;
    while(niveau < finDesNiveaux.length && finDesNiveaux[niveau] > debut) niveau++;
    finDesNiveaux[niveau] = fin;
    e._niveau = niveau;
  }
  return tries;
}

/* ───────────────────────────────────────────────────────────────────────
   Rendu complet : ticks + événements + compteur
   ─────────────────────────────────────────────────────────────────────── */
function rendre(){
  // dimensions du plan
  plan.style.width = largeurPlan() + "px";

  construireTicks();

  // efface les anciens marqueurs
  plan.querySelectorAll(".evt, .periode").forEach(n=>n.remove());

  const hauteur = viewport.clientHeight;
  const axeY = hauteur/2;

  // On sépare les deux familles et on les empile indépendamment :
  //   • POINTS   → toujours AU-DESSUS de l'axe
  //   • PÉRIODES → toujours EN DESSOUS de l'axe (sous les étiquettes d'années)
  const listeFiltree = filtrer();
  const points   = repartirNiveaux(listeFiltree.filter(e=>!estPeriode(e)));
  const periodes = repartirNiveaux(listeFiltree.filter(e=> estPeriode(e)));
  evtVisibles = points.concat(periodes);

  for(const e of evtVisibles){
    const cat = CATEGORIES[e.category] || { couleur:"var(--bronze)", icone:"", libelle:e.category };

    // Côté fixé par le type, et empilement direct vers l'extérieur (niveau 0,1,2…)
    const distance = estPeriode(e)
      ? CONFIG.basePeriode + e._niveau * CONFIG.hauteurBande   // bandeaux, vers le bas
      : CONFIG.basePoint   + e._niveau * CONFIG.hauteurNiveau; // sceaux, vers le haut

    const node = document.createElement("div");
    node.style.setProperty("--cat", cat.couleur);
    node.dataset.id = e._id;          // identifiant stable pour la surbrillance
    node.tabIndex = 0;
    node.setAttribute("role","button");
    node.setAttribute("aria-label", libelleAnnee(e) + " — " + e.title);

    if(estPeriode(e)){
      // ── ÉVÉNEMENT-PÉRIODE : bandeau horizontal du début à la fin (EN BAS) ──
      let xd = anneeEnX(e.year), xf = anneeEnX(e.yearEnd);
      if(xf - xd < CONFIG.largeurEvt){ const c=(xd+xf)/2; xd=c-CONFIG.largeurEvt/2; xf=c+CONFIG.largeurEvt/2; }

      node.className = "periode" + (e._id===evtSelId ? " actif" : "");
      node.style.left  = xd + "px";
      node.style.width = (xf - xd) + "px";
      node.innerHTML =
        `<span class="periode-titre">${cat.icone}${echapper(e.title)}</span>` +
        `<span class="periode-annees">${e.year} – ${e.yearEnd}</span>`;

      node.style.top = (axeY + distance) + "px"; node.style.bottom = "auto";

    }else{
      // ── ÉVÉNEMENT PONCTUEL : sceau + titre vers le haut ──
      node.className = "evt" + (e._id===evtSelId ? " actif" : "");
      node.style.left = anneeEnX(e.year) + "px";
      node.innerHTML =
        `<div class="libelle">${echapper(e.title)}</div>` +
        `<div class="annee-mini">${e.year}</div>` +
        `<div class="sceau">${cat.icone}</div>` +
        `<div class="connecteur" style="height:${distance}px"></div>`;
      node.style.bottom = (hauteur - axeY) + "px"; node.style.top = "auto";
    }

    node.addEventListener("click", ()=>{ if(aGlisse) return; selectionner(e._id, true); });
    node.addEventListener("keydown", (ev)=>{ if(ev.key==="Enter"||ev.key===" "){ ev.preventDefault(); selectionner(e._id, true);} });

    plan.appendChild(node);
  }

  // compteur
  const n = evtVisibles.length;
  $("#compteur").innerHTML = `— <b>${n}</b> événement${n>1?"s":""} —`;

  appliquerTransform();
}

/* ───────────────────────────────────────────────────────────────────────
   Déplacement / zoom : application de la transform + bornage
   ─────────────────────────────────────────────────────────────────────── */
function clampDecalage(){
  const largeurVue = viewport.clientWidth;
  const min = Math.min(0, largeurVue - largeurPlan()); // ne pas dépasser à droite
  if(decalageX > 0) decalageX = 0;                      // ni à gauche
  if(decalageX < min) decalageX = min;
}
function appliquerTransform(){
  clampDecalage();
  plan.style.transform = `translateX(${decalageX}px)`;
}

/* Zoom centré sur un point x du viewport (souris ou centre) */
function zoomer(nouveauPx, ancreX){
  nouveauPx = Math.max(CONFIG.pxParAnMin, Math.min(CONFIG.pxParAnMax, nouveauPx));
  if(nouveauPx === pxParAn) return;
  // année actuellement sous l'ancre
  const anneeAncre = xEnAnnee(ancreX - decalageX);
  pxParAn = nouveauPx;
  rendre();                            // re-répartit avec le nouveau zoom
  // on replace l'ancre sur la même année
  decalageX = ancreX - anneeEnX(anneeAncre);
  appliquerTransform();
}

/* Centrer la vue sur une année donnée */
function centrerSurAnnee(an, anime){
  if(anime) plan.classList.add("anime");
  decalageX = viewport.clientWidth/2 - anneeEnX(an);
  appliquerTransform();
  if(anime) setTimeout(()=>plan.classList.remove("anime"), 400);
}

/* ───────────────────────────────────────────────────────────────────────
   Sélection d'un événement → panneau + fenêtre modale
   ─────────────────────────────────────────────────────────────────────── */
function ficheHTML(e){
  const cat = CATEGORIES[e.category] || { couleur:"var(--bronze)", icone:"", libelle:e.category };
  const image = e.image
    ? `<div class="fiche-image"><img src="${e.image}" alt="${echapper(e.title)}"></div>`
    : `<div class="fiche-image">Illustration à venir</div>`; // emplacement image futur
  // Affiche « 300 – 600 A.E. » pour une période, « 412 A.E. » sinon.
  const enTeteAnnee = estPeriode(e)
    ? `${e.year} – ${e.yearEnd}<small> ${CONFIG.suffixeAnnee}</small>`
    : `${e.year}<small> ${CONFIG.suffixeAnnee}</small>`;
  return `
    <div class="fiche-annee">${enTeteAnnee}</div>
    <div class="fiche-titre">${echapper(e.title)}</div>
    <span class="fiche-cat" style="--cat:${cat.couleur}">${cat.icone}${cat.libelle}</span>
    ${image}
    <div class="fiche-desc">${echapper(e.description||"")}</div>
  `;
}

function selectionner(id, ouvrirFenetre){
  evtSelId = id;
  const e = events.find(x=>x._id===id);
  if(!e) return;

  // met à jour le panneau latéral
  $("#panneau-contenu").innerHTML = ficheHTML(e);

  // met en surbrillance le marqueur sélectionné (point OU période)
  rendreEtatActif();

  if(ouvrirFenetre){
    $("#fenetre-contenu").innerHTML = ficheHTML(e);
    $("#voile").classList.add("ouvert");
  }
}

function rendreEtatActif(){
  // ré-applique la classe .actif en retrouvant chaque marqueur par son data-id
  plan.querySelectorAll(".evt, .periode").forEach(n=>{
    n.classList.toggle("actif", Number(n.dataset.id) === evtSelId);
  });
}

/* Navigation Précédent / Suivant dans la fenêtre (par année) */
function naviguer(sens){
  if(!evtVisibles.length) return;
  const ordonne = [...evtVisibles].sort((a,b)=>a.year-b.year || a._id-b._id);
  let idx = ordonne.findIndex(e=>e._id===evtSelId);
  idx = (idx + sens + ordonne.length) % ordonne.length;
  const e = ordonne[idx];
  selectionner(e._id, true);
  centrerSurAnnee(anneeRepr(e), true);   // milieu de période, ou année exacte
}

/* Petit utilitaire : échappe le HTML pour éviter toute injection depuis les textes */
function echapper(s){
  return String(s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* ───────────────────────────────────────────────────────────────────────
   ÉVÉNEMENTS D'INTERFACE (souris, clavier, boutons)
   ─────────────────────────────────────────────────────────────────────── */

// Déplacement par glisser-déposer.
// IMPORTANT : on ne capture le pointeur QU'EN CAS de vrai glissement, sinon la
// capture détourne le clic et la fenêtre ne s'ouvre jamais.
let drag  = null;        // état du glissement à un doigt / souris
let pinch = null;        // état du pincement à deux doigts (mobile/tablette)
let aGlisse = false;     // vrai si le dernier geste était un glissement (bloque le clic)
const pointeurs = new Map(); // doigts/souris actuellement posés (id → position)

viewport.addEventListener("pointerdown", (e)=>{
  pointeurs.set(e.pointerId, { x:e.clientX, y:e.clientY });

  if(pointeurs.size === 1){
    // un seul doigt → glissement horizontal
    drag = { x:e.clientX, depart:decalageX, id:e.pointerId, bouge:false };
    aGlisse = false;
  }else if(pointeurs.size === 2){
    // deux doigts → pincement ; on abandonne le glissement
    drag = null;
    viewport.classList.remove("attrape");
    const p = [...pointeurs.values()];
    const rect = viewport.getBoundingClientRect();
    pinch = {
      distInit: Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y), // écartement initial
      pxInit:   pxParAn,                                       // zoom initial
      ancreX:   (p[0].x + p[1].x)/2 - rect.left                // point fixe = milieu des doigts
    };
    aGlisse = true; // un pincement ne doit pas déclencher de clic
  }
});

viewport.addEventListener("pointermove", (e)=>{
  if(pointeurs.has(e.pointerId)) pointeurs.set(e.pointerId, { x:e.clientX, y:e.clientY });

  // — Pincement (priorité) —
  if(pinch && pointeurs.size >= 2){
    const p = [...pointeurs.values()];
    const dist = Math.hypot(p[0].x - p[1].x, p[0].y - p[1].y);
    if(pinch.distInit > 0) zoomer(pinch.pxInit * (dist / pinch.distInit), pinch.ancreX);
    return;
  }

  // — Glissement à un doigt —
  if(drag){
    const dx = e.clientX - drag.x;
    if(!drag.bouge && Math.abs(dx) > 4){
      drag.bouge = true;
      viewport.classList.add("attrape");
      try{ viewport.setPointerCapture(drag.id); }catch(_){}
    }
    if(drag.bouge){ decalageX = drag.depart + dx; appliquerTransform(); }
  }
});

function finPointeur(e){
  pointeurs.delete(e.pointerId);
  if(pointeurs.size < 2) pinch = null;        // fin du pincement dès qu'il reste < 2 doigts
  if(pointeurs.size === 0){
    if(drag && drag.bouge) aGlisse = true;    // mémorise pour annuler le clic
    if(drag){ try{ viewport.releasePointerCapture(drag.id); }catch(_){} }
    viewport.classList.remove("attrape");
    drag = null;
  }
}
viewport.addEventListener("pointerup", finPointeur);
viewport.addEventListener("pointercancel", finPointeur);

// Zoom à la molette (centré sur le curseur)
viewport.addEventListener("wheel", (e)=>{
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const ancreX = e.clientX - rect.left;
  const facteur = 1 - e.deltaY * CONFIG.facteurMolette;
  zoomer(pxParAn * facteur, ancreX);
}, { passive:false });

// Boutons de zoom (centrés sur le milieu de la vue)
$("#zoom-plus").addEventListener("click", ()=> zoomer(pxParAn*1.3, viewport.clientWidth/2));
$("#zoom-moins").addEventListener("click",()=> zoomer(pxParAn/1.3, viewport.clientWidth/2));

// Bouton « Présent »
$("#present").addEventListener("click", ()=> centrerSurAnnee(CONFIG.anneePresent, true));

// Recherche
$("#recherche").addEventListener("input", (e)=>{ recherche = e.target.value; rendre(); });

// Tout afficher
$("#tout-afficher").addEventListener("click", ()=>{
  filtresActifs = new Set(Object.keys(CATEGORIES));
  document.querySelectorAll(".filtre-puce").forEach(p=>p.setAttribute("aria-pressed","true"));
  rendre();
});

// Fenêtre modale
$("#fermer").addEventListener("click", fermerFenetre);
$("#voile").addEventListener("click", (e)=>{ if(e.target.id==="voile") fermerFenetre(); });
$("#evt-prec").addEventListener("click", ()=> naviguer(-1));
$("#evt-suiv").addEventListener("click", ()=> naviguer(1));
document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") fermerFenetre(); });
function fermerFenetre(){ $("#voile").classList.remove("ouvert"); }

// Bouton panneau : sur ordinateur il replie/déplie le panneau (pour libérer
// la lecture) ; sur mobile/tablette il ouvre/ferme le tiroir coulissant.
$("#bascule-panneau").addEventListener("click", ()=>{
  const panneau = $("#panneau");
  if(window.innerWidth <= 880){
    panneau.classList.toggle("ouvert");
  }else{
    panneau.classList.toggle("replie");
    // la largeur de la frise change : on recalcule une fois la transition finie
    setTimeout(rendre, 320);
  }
});

// Recalcul au redimensionnement
let tempo;
window.addEventListener("resize", ()=>{ clearTimeout(tempo); tempo=setTimeout(rendre, 120); });

/* ───────────────────────────────────────────────────────────────────────
   DÉMARRAGE
   ─────────────────────────────────────────────────────────────────────── */
construireFiltresEtLegende();
rendre();
centrerSurAnnee(CONFIG.anneePresent, false); // ouvre sur l'année présente
</script>
